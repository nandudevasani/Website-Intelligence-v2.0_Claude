<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Intelligence Scanner v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #222633;
    --border: #2a2e3b;
    --text: #e4e6ed;
    --text-muted: #8b8fa3;
    --accent: #4f8ff7;
    --accent-glow: rgba(79, 143, 247, 0.15);
    --green: #34d399;
    --green-bg: rgba(52, 211, 153, 0.1);
    --red: #f87171;
    --red-bg: rgba(248, 113, 113, 0.1);
    --yellow: #fbbf24;
    --yellow-bg: rgba(251, 191, 36, 0.1);
    --orange: #fb923c;
    --orange-bg: rgba(251, 146, 60, 0.1);
    --gray: #6b7280;
    --gray-bg: rgba(107, 114, 128, 0.1);
    --purple: #a78bfa;
    --purple-bg: rgba(167, 139, 250, 0.1);
    --cyan: #22d3ee;
    --cyan-bg: rgba(34, 211, 238, 0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem;
  }

  .container { max-width: 1600px; margin: 0 auto; }

  header { margin-bottom: 1.5rem; }
  header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.15rem; }
  header h1 span { color: var(--accent); }
  header p { color: var(--text-muted); font-size: 0.85rem; }

  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .input-section label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }

  textarea {
    width: 100%;
    height: 120px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    padding: 0.75rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }

  .domain-count {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.4rem;
    font-family: 'JetBrains Mono', monospace;
  }

  .progress-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin: 0.75rem 0;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .progress-wrap.visible { opacity: 1; }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .btn-row { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }

  .btn-primary, .btn-secondary, .btn-stop {
    padding: 0.55rem 1.2rem;
    border: none;
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3d7de5; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--surface-hover); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-stop { background: var(--red); color: #fff; }
  .btn-stop:hover { background: #e05252; }

  #statusMsg {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-left: 0.5rem;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .stat-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }
  .stat-chip .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
    white-space: nowrap;
  }

  thead th {
    background: var(--bg);
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0.65rem 0.6rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 2;
  }

  tbody td {
    padding: 0.55rem 0.6rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  tbody tr:hover { background: var(--surface-hover); }

  .empty {
    text-align: center;
    padding: 2.5rem 1rem !important;
    color: var(--text-muted);
    font-style: italic;
  }

  /* Status badges */
  .badge {
    display: inline-block;
    padding: 0.2rem 0.55rem;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .badge-active { background: var(--green-bg); color: var(--green); }
  .badge-error { background: var(--red-bg); color: var(--red); }
  .badge-parked { background: var(--gray-bg); color: var(--gray); }
  .badge-coming-soon { background: var(--yellow-bg); color: var(--yellow); }
  .badge-under-construction { background: var(--orange-bg); color: var(--orange); }
  .badge-no-content { background: var(--purple-bg); color: var(--purple); }
  .badge-shell { background: var(--cyan-bg); color: var(--cyan); }
  .badge-suspended { background: var(--red-bg); color: var(--red); }
  .badge-scanning { background: var(--accent-glow); color: var(--accent); }

  .social-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.75rem;
  }
  .social-link:hover { text-decoration: underline; }

  .signals {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
  }
  .signals .sig-yes { color: var(--green); }
  .signals .sig-no { color: var(--red); opacity: 0.5; }

  .pages-col {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
  }

  @media (max-width: 768px) {
    body { padding: 0.75rem; }
    .container { max-width: 100%; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Website <span>Intelligence</span> Scanner</h1>
    <p>v2.0 — Multi-page crawl • Layered classification • Business signal detection</p>
  </header>

  <div class="input-section">
    <label>Enter domains (one per line, max 50)</label>
    <textarea id="input" placeholder="example.com&#10;anotherdomain.com&#10;mybusiness.net"></textarea>
    <div class="domain-count" id="counter">0 / 50 domains</div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" id="btnScan">Scan Websites</button>
      <button class="btn-secondary" id="btnExport">Export CSV</button>
      <button class="btn-stop" id="btnStop" style="display:none;">Stop</button>
      <span id="statusMsg"></span>
    </div>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none;"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Domain</th>
          <th>Status</th>
          <th>Code</th>
          <th>Reason</th>
          <th>Business Name</th>
          <th>Phone</th>
          <th>Email</th>
          <th>Street</th>
          <th>City</th>
          <th>State</th>
          <th>ZIP</th>
          <th>Facebook</th>
          <th>Instagram</th>
          <th>LinkedIn</th>
          <th>GMB</th>
          <th>Signals</th>
          <th>Pages Crawled</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="18" class="empty">Enter domains and click Scan to begin</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
(function() {

  // ---- CONFIG ----
  var API = ""; // Same origin — backend serves both API and frontend
  var MAX_DOMAINS = 50;
  var BATCH_SIZE = 2; // 2 domains per batch for multi-page crawl timeout safety

  var stopped = false;
  var allResults = [];

  // ---- DOM ----
  var input = document.getElementById("input");
  var tbody = document.getElementById("tbody");
  var counter = document.getElementById("counter");
  var statusMsg = document.getElementById("statusMsg");
  var progressWrap = document.getElementById("progressWrap");
  var progressBar = document.getElementById("progressBar");
  var btnScan = document.getElementById("btnScan");
  var btnExport = document.getElementById("btnExport");
  var btnStop = document.getElementById("btnStop");
  var statsBar = document.getElementById("statsBar");

  // ---- HELPERS ----
  function esc(s) {
    if (!s) return "";
    var d = document.createElement("div");
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  function getDomains() {
    var lines = input.value.split("\n");
    var out = [];
    for (var i = 0; i < lines.length; i++) {
      var d = lines[i].trim().replace(/^https?:\/\//, "").replace(/\/+$/, "").toLowerCase();
      if (d && out.indexOf(d) === -1) out.push(d);
    }
    return out.slice(0, MAX_DOMAINS);
  }

  function setProgress(pct) {
    progressBar.style.width = Math.min(pct, 100) + "%";
  }

  // Domain count updater
  input.addEventListener("input", function() {
    var count = getDomains().length;
    counter.textContent = count + " / " + MAX_DOMAINS + " domains";
  });

  // ---- STATUS BADGE ----
  function statusBadge(status) {
    var cls = "badge-error";
    var label = status;

    switch (status) {
      case "Active":           cls = "badge-active"; break;
      case "Shell":            cls = "badge-shell"; break;
      case "Coming Soon":      cls = "badge-coming-soon"; break;
      case "Under Construction": cls = "badge-under-construction"; break;
      case "Parked":           cls = "badge-parked"; break;
      case "No Content":       cls = "badge-no-content"; break;
      case "Suspended":        cls = "badge-suspended"; break;
      case "Error":            cls = "badge-error"; break;
      default:                 cls = "badge-error";
    }

    return '<span class="badge ' + cls + '">' + esc(label) + '</span>';
  }

  // ---- SIGNALS DISPLAY ----
  function signalsHtml(signalsStr) {
    if (!signalsStr) return "";
    return signalsStr
      .replace(/✓/g, '<span class="sig-yes">✓</span>')
      .replace(/✗/g, '<span class="sig-no">✗</span>');
  }

  // ---- SOCIAL LINK ----
  function socialCell(url) {
    if (!url) return '<span style="color:var(--text-muted)">—</span>';
    try {
      var u = new URL(url);
      var short = u.pathname.replace(/\/$/, "").split("/").pop() || u.hostname;
      return '<a href="' + esc(url) + '" target="_blank" class="social-link" title="' + esc(url) + '">' + esc(short) + '</a>';
    } catch (e) {
      return '<a href="' + esc(url) + '" target="_blank" class="social-link">Link</a>';
    }
  }

  // ---- BUILD TABLE ROW ----
  function buildRow(r, num) {
    var social = r.social || {};
    return '<tr>' +
      '<td>' + num + '</td>' +
      '<td><strong>' + esc(r.domain) + '</strong></td>' +
      '<td>' + statusBadge(r.status) + '</td>' +
      '<td>' + (r.statusCode || "—") + '</td>' +
      '<td>' + esc(r.reason || "") + '</td>' +
      '<td>' + esc(r.name || "") + '</td>' +
      '<td>' + esc(r.phone || "") + '</td>' +
      '<td>' + esc(r.email || "") + '</td>' +
      '<td>' + esc(r.street || "") + '</td>' +
      '<td>' + esc(r.city || "") + '</td>' +
      '<td>' + esc(r.state || "") + '</td>' +
      '<td>' + esc(r.zip || "") + '</td>' +
      '<td>' + socialCell(social.facebook) + '</td>' +
      '<td>' + socialCell(social.instagram) + '</td>' +
      '<td>' + socialCell(social.linkedin) + '</td>' +
      '<td>' + socialCell(social.gmb) + '</td>' +
      '<td><span class="signals">' + signalsHtml(r.signals || "") + '</span></td>' +
      '<td><span class="pages-col">' + esc(r.pagesCrawled || "") + '</span></td>' +
      '</tr>';
  }

  // ---- SCANNING ROW (placeholder while waiting) ----
  function scanningRow(domain, num) {
    return '<tr id="row-' + num + '">' +
      '<td>' + num + '</td>' +
      '<td><strong>' + esc(domain) + '</strong></td>' +
      '<td>' + statusBadge("Scanning...") + '</td>' +
      '<td colspan="15" style="color:var(--text-muted);font-style:italic;">Crawling pages...</td>' +
      '</tr>';
  }

  // ---- ERROR ROW ----
  function errorRow(domain, error, num) {
    return '<tr>' +
      '<td>' + num + '</td>' +
      '<td><strong>' + esc(domain) + '</strong></td>' +
      '<td><span class="badge badge-error">Error</span></td>' +
      '<td>—</td>' +
      '<td>' + esc(error) + '</td>' +
      '<td colspan="13">—</td>' +
      '</tr>';
  }

  // ---- UPDATE STATS BAR ----
  function updateStats() {
    var counts = { Active: 0, Shell: 0, "Coming Soon": 0, "Under Construction": 0, Parked: 0, "No Content": 0, Suspended: 0, Error: 0 };

    for (var i = 0; i < allResults.length; i++) {
      var s = allResults[i].status || "Error";
      if (counts.hasOwnProperty(s)) counts[s]++;
      else counts["Error"]++;
    }

    var html = "";
    var colors = {
      Active: "var(--green)", Shell: "var(--cyan)", "Coming Soon": "var(--yellow)",
      "Under Construction": "var(--orange)", Parked: "var(--gray)",
      "No Content": "var(--purple)", Suspended: "var(--red)", Error: "var(--red)"
    };

    for (var key in counts) {
      if (counts[key] > 0) {
        html += '<span class="stat-chip" style="background:' + colors[key] + '15">' +
          '<span class="dot" style="background:' + colors[key] + '"></span>' +
          '<span style="color:' + colors[key] + '">' + counts[key] + ' ' + key + '</span></span>';
      }
    }

    statsBar.innerHTML = html;
    statsBar.style.display = html ? "flex" : "none";
  }

  // ---- EXPORT CSV ----
  btnExport.addEventListener("click", function() {
    if (allResults.length === 0) {
      alert("No results to export. Run a scan first.");
      return;
    }

    var headers = ["#","Domain","Status","HTTP Code","Reason","Business Name","Phone","Email","Street","City","State","ZIP","Facebook","Instagram","LinkedIn","GMB","Signals","Pages Crawled"];
    var rows = [headers.join(",")];

    for (var i = 0; i < allResults.length; i++) {
      var r = allResults[i];
      var social = r.social || {};
      var row = [
        i + 1,
        csvSafe(r.domain),
        csvSafe(r.status),
        r.statusCode || "",
        csvSafe(r.reason),
        csvSafe(r.name),
        csvSafe(r.phone),
        csvSafe(r.email),
        csvSafe(r.street),
        csvSafe(r.city),
        csvSafe(r.state),
        csvSafe(r.zip),
        csvSafe(social.facebook),
        csvSafe(social.instagram),
        csvSafe(social.linkedin),
        csvSafe(social.gmb),
        csvSafe(r.signals),
        csvSafe(r.pagesCrawled),
      ];
      rows.push(row.join(","));
    }

    var csv = rows.join("\n");
    var blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "website-intelligence-" + new Date().toISOString().slice(0, 10) + ".csv";
    a.click();
    URL.revokeObjectURL(url);
  });

  function csvSafe(val) {
    if (!val) return "";
    val = String(val);
    if (val.indexOf(",") !== -1 || val.indexOf('"') !== -1 || val.indexOf("\n") !== -1) {
      return '"' + val.replace(/"/g, '""') + '"';
    }
    return val;
  }

  // ---- MAIN SCAN ----
  btnScan.addEventListener("click", function() {
    var domains = getDomains();
    if (domains.length === 0) {
      statusMsg.textContent = "Enter at least one domain.";
      statusMsg.style.color = "var(--yellow)";
      return;
    }

    // Reset
    stopped = false;
    allResults = [];
    tbody.innerHTML = "";
    statsBar.style.display = "none";
    statsBar.innerHTML = "";
    progressWrap.classList.add("visible");
    setProgress(5);
    btnScan.disabled = true;
    btnStop.style.display = "inline-block";
    statusMsg.textContent = "Waking up server...";
    statusMsg.style.color = "var(--text-muted)";

    // Add scanning placeholders
    var rowNum = 0;
    for (var i = 0; i < domains.length; i++) {
      rowNum++;
      tbody.innerHTML += scanningRow(domains[i], rowNum);
    }

    // Chunk domains into batches of BATCH_SIZE
    var chunks = [];
    for (var j = 0; j < domains.length; j += BATCH_SIZE) {
      chunks.push(domains.slice(j, j + BATCH_SIZE));
    }

    var chunkIndex = 0;
    var completedDomains = 0;

    function processNextChunk() {
      if (stopped || chunkIndex >= chunks.length) {
        // Done
        btnScan.disabled = false;
        btnStop.style.display = "none";
        setProgress(100);
        if (stopped) {
          statusMsg.textContent = "Stopped. " + completedDomains + "/" + domains.length + " scanned.";
          statusMsg.style.color = "var(--yellow)";
        } else {
          statusMsg.textContent = "Done! " + domains.length + " domains scanned.";
          statusMsg.style.color = "var(--green)";
        }
        updateStats();
        return;
      }

      var chunk = chunks[chunkIndex];
      statusMsg.textContent = "Scanning batch " + (chunkIndex + 1) + "/" + chunks.length + " (" + completedDomains + "/" + domains.length + " done)...";

      var xhr = new XMLHttpRequest();
      xhr.open("POST", API + "/batch-scan");
      xhr.setRequestHeader("Content-Type", "application/json");
      xhr.timeout = 120000; // 2 min timeout per batch (multi-page crawl is slow)

      xhr.onload = function() {
        if (xhr.status >= 200 && xhr.status < 300) {
          try {
            var results = JSON.parse(xhr.responseText);
            for (var k = 0; k < results.length; k++) {
              completedDomains++;
              allResults.push(results[k]);

              // Replace scanning row with real result
              var existingRow = document.getElementById("row-" + completedDomains);
              if (existingRow) {
                existingRow.outerHTML = buildRow(results[k], completedDomains);
              }
            }
          } catch (e) {
            console.error("Parse error:", e);
            for (var m = 0; m < chunk.length; m++) {
              completedDomains++;
              var existing = document.getElementById("row-" + completedDomains);
              if (existing) {
                existing.outerHTML = errorRow(chunk[m], "Response parse error", completedDomains);
              }
            }
          }
        } else {
          for (var p = 0; p < chunk.length; p++) {
            completedDomains++;
            var exist = document.getElementById("row-" + completedDomains);
            if (exist) {
              exist.outerHTML = errorRow(chunk[p], "Server error " + xhr.status, completedDomains);
            }
          }
        }

        var pct = 10 + (completedDomains / domains.length) * 90;
        setProgress(pct);
        updateStats();
        chunkIndex++;
        processNextChunk();
      };

      xhr.onerror = function() {
        for (var q = 0; q < chunk.length; q++) {
          completedDomains++;
          var ex = document.getElementById("row-" + completedDomains);
          if (ex) {
            ex.outerHTML = errorRow(chunk[q], "Network error", completedDomains);
          }
        }
        setProgress(10 + (completedDomains / domains.length) * 90);
        chunkIndex++;
        processNextChunk();
      };

      xhr.ontimeout = function() {
        for (var q = 0; q < chunk.length; q++) {
          completedDomains++;
          var ex = document.getElementById("row-" + completedDomains);
          if (ex) {
            ex.outerHTML = errorRow(chunk[q], "Timeout — server took too long", completedDomains);
          }
        }
        setProgress(10 + (completedDomains / domains.length) * 90);
        chunkIndex++;
        processNextChunk();
      };

      xhr.send(JSON.stringify({ domains: chunk }));
    }

    // Health check first, then start scanning
    var health = new XMLHttpRequest();
    health.open("GET", API + "/health");
    health.timeout = 90000;

    health.onload = function() {
      if (health.status >= 200 && health.status < 300) {
        setProgress(10);
        statusMsg.textContent = "Server is up. Starting scan...";
        processNextChunk();
      } else {
        statusMsg.textContent = "Server error: " + health.status + ". Try again.";
        statusMsg.style.color = "var(--red)";
        btnScan.disabled = false;
        btnStop.style.display = "none";
      }
    };

    health.onerror = function() {
      statusMsg.textContent = "Cannot reach server. It may be sleeping — try again in 60s.";
      statusMsg.style.color = "var(--red)";
      btnScan.disabled = false;
      btnStop.style.display = "none";
      progressWrap.classList.remove("visible");
    };

    health.ontimeout = function() {
      statusMsg.textContent = "Server took too long to respond. Try again.";
      statusMsg.style.color = "var(--red)";
      btnScan.disabled = false;
      btnStop.style.display = "none";
      progressWrap.classList.remove("visible");
    };

    health.send();
  });

  // Stop button
  btnStop.addEventListener("click", function() {
    stopped = true;
    btnStop.style.display = "none";
    statusMsg.textContent = "Stopping after current batch...";
    statusMsg.style.color = "var(--yellow)";
  });

})();
</script>

</body>
</html>
